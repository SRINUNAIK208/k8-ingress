apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  labels:
    component: ingress
    project: roboshop
    tier: app 
spec:
  replicas: 3
  selector:
    matchLabels:
      component: ingress
      project: roboshop
      tier: app
  template:
    metadata:
      labels:
        component: ingress
        project: roboshop
        tier: app
    spec:
      containers:
       - name: nginx
         image: srinunaik208/app1:v1
---
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  selector:
    component: ingress
    project: roboshop
    tier: app
  ports:
   - protocol: TCP
     port: 80
     targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: ingress
metadata:
  name: ingress-alb
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:824333137275:certificate/4cb8ab79-0741-4d5d-8bcb-2bf354c63fa4
    alb.ingress.kubernetes.io/target-type: ip 
    alb.ingress.kubernetes.io/scheme:  internet-facing
spec:
  rules:
   - host: "app1.srinunayak.online"
     http:
       paths:
        - pathType: Prefix 
          path: "/"
          backend:
            service:
              name: app1
              port:
               number: 80
     
